services:

  backend:
    build: ./backend
    container_name: lab27-backend
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://localhost:27017/myAppDB
      - MONGO_COMPASS_URI=mongodb://localhost:27017
      - MONGO_DOCKER_URI=mongodb://mongo:27017/myAppDB
      - MONGO_DB_NAME=myAppDB
      - RUNNING_IN_DOCKER=true
      - PORT=5000
    depends_on:
      - mongo
    networks:
      - lab27-network

  frontend:
    build: ./frontend
    container_name: lab27-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5001/api
    depends_on:
      - backend
    networks:
      - lab27-network

  mongo:
    image: mongo:6
    container_name: lab27-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - lab27-network

volumes:
  mongo-data:

networks:
  lab27-network:
    driver: bridge
